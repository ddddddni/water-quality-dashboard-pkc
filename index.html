<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบเฝ้าระวังคุณภาพน้ำ IoT</title>

<!-- Firebase (compat, ใช้งานง่ายผ่าน CDN) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", "Sarabun", sans-serif; }
  body { background:#0f172a; color:#e2e8f0; padding: 20px; }
  h1 { text-align:center; margin-bottom: 6px; font-size: 22px; }
  .updated { text-align:center; color:#94a3b8; font-size:13px; margin-bottom:20px; }

  .cards { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap:12px; max-width:900px; margin:0 auto 24px; }
  .card { background:#1e293b; border-radius:12px; padding:16px; text-align:center; border:1px solid #334155; }
  .card .label { font-size:13px; color:#94a3b8; margin-bottom:6px; }
  .card .value { font-size:26px; font-weight:bold; }
  .card.ok .value { color:#4ade80; }
  .card.warn .value { color:#f87171; }

  .chart-box { max-width:900px; margin:0 auto 24px; background:#1e293b; border-radius:12px; padding:16px; border:1px solid #334155; }
  canvas { max-height:280px; }

  .status { text-align:center; font-size:13px; color:#94a3b8; }
</style>
</head>
<body>

<h1>🌊 ระบบเฝ้าระวังคุณภาพน้ำและระดับน้ำอัจฉริยะ</h1>
<div class="updated" id="lastUpdate">กำลังโหลดข้อมูล...</div>

<div class="cards">
  <div class="card" id="card-ph">
    <div class="label">pH</div>
    <div class="value" id="val-ph">--</div>
  </div>
  <div class="card" id="card-tds">
    <div class="label">TDS (ppm)</div>
    <div class="value" id="val-tds">--</div>
  </div>
  <div class="card" id="card-temp">
    <div class="label">อุณหภูมิ (°C)</div>
    <div class="value" id="val-temp">--</div>
  </div>
  <div class="card" id="card-level">
    <div class="label">ระดับน้ำ (%)</div>
    <div class="value" id="val-level">--</div>
  </div>
</div>

<div class="chart-box">
  <canvas id="phChart"></canvas>
</div>
<div class="chart-box">
  <canvas id="tdsChart"></canvas>
</div>
<div class="chart-box">
  <canvas id="tempChart"></canvas>
</div>
<div class="chart-box">
  <canvas id="levelChart"></canvas>
</div>

<div class="status" id="connStatus">กำลังเชื่อมต่อ Firebase...</div>

<script>
// ===== Firebase config =====
const firebaseConfig = {
  apiKey: "AIzaSyD4RJXXmmCgT1JmdkADF5_jEO1Xf8lUT6U",
  authDomain: "water-monitoring2026.firebaseapp.com",
  databaseURL: "https://water-monitoring2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "water-monitoring2026",
  storageBucket: "water-monitoring2026.firebasestorage.app",
  messagingSenderId: "102072996918",
  appId: "1:102072996918:web:05b83cad4271f717a57497"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== เกณฑ์ปกติ (ให้ตรงกับ ESP32) =====
const THRESHOLDS = {
  ph:    { min: 6.5, max: 8.5 },
  tds:   { max: 500 },
  temp:  { max: 32.0 },
  level: { min: 20.0 }
};

function setCard(id, value, ok) {
  document.getElementById("val-" + id).textContent = value;
  document.getElementById("card-" + id).className = "card " + (ok ? "ok" : "warn");
}

// ===== อ่านค่าปัจจุบันแบบเรียลไทม์ =====
db.ref("current").on("value", (snap) => {
  const d = snap.val();
  if (!d) return;

  setCard("ph",    d.ph.toFixed(2), d.ph >= THRESHOLDS.ph.min && d.ph <= THRESHOLDS.ph.max);
  setCard("tds",   d.tds,           d.tds <= THRESHOLDS.tds.max);
  setCard("temp",  d.temp.toFixed(1), d.temp <= THRESHOLDS.temp.max);
  setCard("level", d.level,         d.level >= THRESHOLDS.level.min);

  const dt = new Date(d.time * 1000);
  document.getElementById("lastUpdate").textContent =
    "อัปเดตล่าสุด: " + dt.toLocaleString("th-TH");
  document.getElementById("connStatus").textContent = "เชื่อมต่อ Firebase สำเร็จ ✅";
});

// ===== กราฟย้อนหลัง =====
function makeChart(ctx, label, color) {
  return new Chart(ctx, {
    type: "line",
    data: { labels: [], datasets: [{
      label: label, data: [], borderColor: color,
      backgroundColor: color + "33", tension: 0.3, pointRadius: 2
    }]},
    options: {
      responsive: true,
      scales: {
        x: { ticks: { color: "#94a3b8" } },
        y: { ticks: { color: "#94a3b8" } }
      },
      plugins: { legend: { labels: { color: "#e2e8f0" } } }
    }
  });
}

const phChart    = makeChart(document.getElementById("phChart"),    "pH",           "#38bdf8");
const tdsChart   = makeChart(document.getElementById("tdsChart"),   "TDS (ppm)",    "#fbbf24");
const tempChart  = makeChart(document.getElementById("tempChart"),  "อุณหภูมิ (°C)", "#f87171");
const levelChart = makeChart(document.getElementById("levelChart"), "ระดับน้ำ (%)",  "#4ade80");

// ดึงประวัติ 50 รายการล่าสุด เรียงตามเวลา แล้วอัปเดตกราฟแบบเรียลไทม์
db.ref("history").limitToLast(50).on("value", (snap) => {
  const rows = [];
  snap.forEach((child) => rows.push(child.val()));

  const labels = rows.map(r => new Date(r.time * 1000).toLocaleTimeString("th-TH"));

  phChart.data.labels    = labels; phChart.data.datasets[0].data    = rows.map(r => r.ph);
  tdsChart.data.labels   = labels; tdsChart.data.datasets[0].data   = rows.map(r => r.tds);
  tempChart.data.labels  = labels; tempChart.data.datasets[0].data  = rows.map(r => r.temp);
  levelChart.data.labels = labels; levelChart.data.datasets[0].data = rows.map(r => r.level);

  phChart.update(); tdsChart.update(); tempChart.update(); levelChart.update();
});

db.ref(".info/connected").on("value", (snap) => {
  if (snap.val() !== true) {
    document.getElementById("connStatus").textContent = "⚠️ ขาดการเชื่อมต่อ Firebase";
  }
});
</script>

</body>
</html>
